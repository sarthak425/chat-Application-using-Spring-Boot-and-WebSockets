spring.application.name=chatBox
server.address=0.0.0.0
server.port=${PORT:8082}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:chatbox;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

app.jwt.secret=${JWT_SECRET:change-me-in-production-change-me-in-production}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}
app.upload.dir=${UPLOAD_DIR:uploads}

spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

management.endpoints.web.exposure.include=health,info
